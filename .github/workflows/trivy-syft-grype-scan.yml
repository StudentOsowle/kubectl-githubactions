# .github/workflows/trivy-syft-grype-scan.yml

name: trivy/syft/grype scans

on:
  workflow_run:
    workflows: ["prod-container-scan"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: scanning images
        required: true
        type: string

# ── Global env vars ────────────────────────────────────────────────────────────

jobs:
  security-scan:
    runs-on: [self-hosted, linux, X64]
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: dev
    permissions:
      id-token: write
      contents: read
      actions: read
      security-events: write
    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Download build artifact ─────────────────────────────────────
      - name: Download build artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          path: build-artifact
          workflow_conclusion: success
          run_id: ${{ github.event.workflow_run.id }}
          github_token: ${{ secrets.GHA_TOKEN }}

      # ── 3. Docker Hub Login ────────────────────────────────────────────
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ── 4. Configure AWS credentials ──────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 5. Log in to Amazon ECR ───────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 6. Determine image tag ────────────────────────────────────────
      - name: Determine image tag
        id: image_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          elif [ -f "build-artifacts/image-tag.txt" ]; then
            IMAGE_TAG=$(cat build-artifacts/image-tag.txt)
            echo "Image tag from build artifact: $IMAGE_TAG"
          else
            echo "Warning: Build artifact not found, falling back to latest ECR image"
            IMAGE_TAG=$(aws ecr describe-images \
              --region ${{ secrets.AWS_REGION }} \
              --repository-name ${{ secrets.ECR_REPOSITORY }} \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
              --output text \
              --filter "tagStatus=TAGGED")
          fi
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Scanning image tag: $IMAGE_TAG"

      # ── 7. Pull image from ECR ────────────────────────────────────────
      - name: Pull image from ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
        run: |
          docker pull $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG

      # ── 8. Install Trivy ──────────────────────────────────────────────
      - name: Install Trivy
        run: |
          if ! command -v trivy &> /dev/null; then
            echo "Installing Trivy..."
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install trivy -y
          fi
          trivy --version

      # ── 9. Scan with Trivy ────────────────────────────────────────────
      - name: Scan with Trivy
        run: |
          mkdir -p trivy-reports
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --format json \
            --output trivy-reports/trivy-results.json \
            ${{ steps.image_tag.outputs.tag }}
        continue-on-error: true

      # ── 10. Install Grype ─────────────────────────────────────────────
      - name: Install Grype
        run: |
          if ! command -v grype &> /dev/null; then
            echo "Installing Grype..."
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b $HOME/.local/bin
          fi
          export PATH=$HOME/.local/bin:$PATH
          grype version

      # ── 11. Scan with Grype ───────────────────────────────────────────
      - name: Scan with Grype
        run: |
          export PATH=$HOME/.local/bin:$PATH
          mkdir -p grype-reports
          grype ${{ steps.image_tag.outputs.tag }} \
            --fail-on critical \
            -o json \
            --file grype-reports/grype-results.json
        continue-on-error: true

      # ── 12. Install Syft ──────────────────────────────────────────────
      - name: Install Syft
        run: |
          if ! command -v syft &> /dev/null; then
            echo "Installing Syft..."
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          fi
          syft version

      # ── 13. Scan with Syft ────────────────────────────────────────────
      - name: Scan with Syft
        run: |
          mkdir -p syft-reports
          syft ${{ steps.image_tag.outputs.tag }} \
            -o spdx-json \
            --file syft-reports/syft-sbom.json
        continue-on-error: true

      # ── 14. Push SBOM to S3 ───────────────────────────────────────────
      - name: Push SBOM to S3
        run: |
          aws s3 cp syft-reports/syft-sbom.json \
            s3://${{ secrets.S3_BUCKET_NAME }}/sboms/${{ steps.image_tag.outputs.tag }}/syft-sbom.json \
            --region ${{ secrets.AWS_REGION }}

      # ── 15. Upload all reports ────────────────────────────────────────
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            trivy-reports/
            grype-reports/
            syft-reports/
          retention-days: 14

      # ── 16. Summarize scan results ────────────────────────────────────
      - name: Summarize scan results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.image_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-reports/trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-reports/trivy-results.json)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-reports/trivy-results.json)

          echo "### Vulnerability Count" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL_PACKAGES=$(jq '.packages | length' syft-reports/syft-sbom.json)
          echo "### SBOM Generated" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Packages:** $TOTAL_PACKAGES" >> $GITHUB_STEP_SUMMARY
          echo "- **Format:** SPDX JSON" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Reports" >> $GITHUB_STEP_SUMMARY
          echo "- [View Security Tab](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY

      # ── 17. Check vulnerability threshold ─────────────────────────────
      - name: Check vuln threshold
        if: always()
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-reports/trivy-results.json)
          echo "Found $CRITICAL critical vulnerabilities"
          # Uncomment to hard fail on critical:
          # if [ "$CRITICAL" -gt 0 ]; then
          #   echo "❌ Build failed: Critical vulnerabilities found"
          #   exit 1
          # fi
          echo "✅ Vulnerability check passed"

      # ── 18. Send SBOM to Slack ────────────────────────────────────────
      - name: Send SBOM to Slack
        run: |
          SBOM_SUMMARY=$(jq -r '
            "Packages: \(.packages | length)\nTop 5:\n• " +
            ([.packages[0:5][].name] | join("\n• "))
          ' syft-reports/syft-sbom.json)

          curl -X POST \
            -H "Content-type: application/json" \
            --data "$(jq -n \
              --arg summary "$SBOM_SUMMARY" \
              --arg image "${{ steps.image_tag.outputs.tag }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                channel: "${{ secrets.SLACK_MEMBER_ID }}",
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":shield: SBOM Scan Complete" }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*Image:* `\($image)`\n\($summary)" }
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "View Full Report" },
                        url: $url
                      }
                    ]
                  }
                ]
              }')" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      # ── 19. Send report via Resend ────────────────────────────────────
      - name: Send scan report via Resend
        if: always()
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-reports/trivy-results.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-reports/trivy-results.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-reports/trivy-results.json 2>/dev/null || echo "0")
          TOTAL_PACKAGES=$(jq '.packages | length' syft-reports/syft-sbom.json 2>/dev/null || echo "0")

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"onboarding@resend.dev\",
              \"to\": \"orionsowle@gmail.com\",
              \"subject\": \"Security Scan Report - ${{ steps.image_tag.outputs.tag }}\",
              \"html\": \"<h2>Security Scan Report</h2><p><strong>Image:</strong> ${{ steps.image_tag.outputs.tag }}</p><h3>Vulnerability Summary</h3><table border='1'><tr><th>Severity</th><th>Count</th></tr><tr><td>🔴 Critical</td><td>$CRITICAL</td></tr><tr><td>🟠 High</td><td>$HIGH</td></tr><tr><td>🟡 Medium</td><td>$MEDIUM</td></tr></table><h3>SBOM</h3><p>Total Packages: $TOTAL_PACKAGES</p><p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Full Report on GitHub</a></p>\"
            }"

      # ── 20. Cleanup ───────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -rf trivy-reports grype-reports syft-reports
          docker system prune -f